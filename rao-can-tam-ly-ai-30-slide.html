<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hồ Sơ Bằng Chứng — Rào Cản Tâm Lý Với AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B0D12; --bg-raise:#12151C; --paper:#EFE9DA; --paper-line:#D9CFB6;
  --ink:#ECEAE3; --ink-dim:#9CA1AC; --ink-dimmer:#5B606C;
  --rule:#23262F; --rule-soft:#1A1D24;
  --teal:#3FD8C4; --amber:#F0A93B; --violet:#A98CFF; --rose:#FF7A8A;
  --serif:'Source Serif 4', Georgia, serif;
  --mono:'IBM Plex Mono', 'Courier New', monospace;
  --sans:'Inter', 'Segoe UI', sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--sans);height:100%;overflow:hidden;}
body{
  background-image:
    radial-gradient(ellipse 900px 500px at 12% -10%, rgba(63,216,196,.07), transparent 60%),
    radial-gradient(ellipse 700px 500px at 100% 110%, rgba(169,140,255,.06), transparent 60%);
}
::selection{background:var(--teal);color:#0B0D12;}

#deck{position:relative;width:100vw;height:100vh;overflow:hidden;}

/* ---- top chrome ---- */
#chrome-top{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;
  padding:18px 34px;pointer-events:none;}
#chrome-top .brand{font-family:var(--mono);font-size:11.5px;letter-spacing:.14em;color:var(--ink-dimmer);text-transform:uppercase;}
#chrome-top .brand b{color:var(--teal);font-weight:600;}
#progress-wrap{position:fixed;top:0;left:0;right:0;height:3px;background:var(--rule-soft);z-index:60;}
#progress-bar{height:100%;background:linear-gradient(90deg,var(--teal),var(--violet));width:0%;transition:width .45s cubic-bezier(.4,0,.2,1);}
#counter{font-family:var(--mono);font-size:12px;color:var(--ink-dim);pointer-events:none;letter-spacing:.05em;}
#counter b{color:var(--ink);}

/* ---- bottom nav ---- */
#chrome-bottom{position:fixed;bottom:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;
  padding:16px 34px 20px;}
.navbtn{display:flex;align-items:center;gap:8px;background:var(--bg-raise);border:1px solid var(--rule);color:var(--ink-dim);
  font-family:var(--mono);font-size:12px;letter-spacing:.06em;padding:9px 16px;border-radius:999px;cursor:pointer;
  transition:all .15s ease;user-select:none;}
.navbtn:hover{color:var(--ink);border-color:var(--teal);background:#161A22;}
.navbtn:active{transform:scale(.96);}
.navbtn.disabled{opacity:.25;pointer-events:none;}
#dots{display:flex;gap:5px;align-items:center;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--rule);cursor:pointer;transition:all .2s;}
.dot:hover{background:var(--ink-dim);}
.dot.active{background:var(--teal);width:16px;border-radius:3px;}

/* ---- slide stage ---- */
.slide{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;
  padding:88px 64px 84px;opacity:0;transform:translateY(18px);pointer-events:none;transition:opacity .5s cubic-bezier(.4,0,.2,1),transform .5s cubic-bezier(.4,0,.2,1);
  overflow-y:auto;}
.slide.active{opacity:1;transform:translateY(0);pointer-events:auto;}
.slide-inner{max-width:1280px;margin:0 auto;width:100%;}

/* ---- cover ---- */
.cover{justify-content:center;align-items:center;text-align:center;}
.cover .slide-inner{max-width:980px;}
.cover .tagline{font-family:var(--mono);font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--teal);margin-bottom:22px;}
.cover .sup{font-family:var(--mono);font-size:12.5px;color:var(--ink-dimmer);margin-bottom:34px;letter-spacing:.02em;}
.cover h1{font-family:var(--serif);font-weight:600;font-size:clamp(34px,5.6vw,66px);line-height:1.14;letter-spacing:-.01em;margin:0 0 26px;}
.cover h1 em{font-style:normal;color:var(--teal);background:linear-gradient(180deg,transparent 62%,rgba(63,216,196,.18) 62%);padding:0 2px;}
.cover .sub{font-size:16px;line-height:1.7;color:var(--ink-dim);max-width:680px;margin:0 auto 46px;}
.cover-meta{display:flex;gap:0;justify-content:center;border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);}
.cover-meta .m{padding:22px 34px;border-right:1px solid var(--rule);}
.cover-meta .m:last-child{border-right:none;}
.cover-meta .mv{font-family:var(--serif);font-size:28px;font-weight:600;color:var(--ink);}
.cover-meta .ml{font-family:var(--mono);font-size:10.5px;color:var(--ink-dimmer);text-transform:uppercase;letter-spacing:.08em;margin-top:4px;}

/* ---- content slide header ---- */
.tag-pill{display:inline-block;font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--amber);
  border:1px solid rgba(240,169,59,.35);background:rgba(240,169,59,.06);padding:5px 12px;border-radius:999px;margin-bottom:18px;}
.kicker{font-family:var(--mono);font-size:12px;color:var(--ink-dimmer);letter-spacing:.05em;margin-bottom:10px;}
h2.title{font-family:var(--serif);font-weight:600;font-size:clamp(24px,3vw,38px);line-height:1.24;letter-spacing:-.01em;margin:0 0 16px;max-width:920px;}
h2.title em{font-style:normal;color:var(--teal);}
.lede{font-size:15px;line-height:1.75;color:var(--ink-dim);max-width:860px;margin-bottom:34px;}

/* ---- cards grid ---- */
.cards{display:grid;gap:16px;margin-bottom:22px;}
.cards.g3{grid-template-columns:repeat(3,1fr);}
.cards.g4{grid-template-columns:repeat(4,1fr);}

.card{position:relative;min-height:196px;border-radius:14px;background:var(--bg-raise);
  border:1px solid var(--rule);border-top:3px solid var(--accent,var(--teal));overflow:hidden;cursor:pointer;
  transition:border-color .2s ease, transform .2s ease;}
.card:hover, .card.flipped{transform:translateY(-3px);}
.card-front{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:22px 22px;
  transition:opacity .3s ease, transform .3s ease;}
.card-front .v{font-family:var(--serif);font-weight:600;font-size:26px;color:var(--accent,var(--teal));line-height:1.15;letter-spacing:-.01em;}
.card-front .l{font-size:12.5px;color:var(--ink-dim);line-height:1.5;margin-top:10px;}
.card-front .flip-hint{position:absolute;bottom:12px;right:14px;font-family:var(--mono);font-size:9px;color:var(--ink-dimmer);
  letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;gap:4px;}
.card-front .flip-hint::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--accent,var(--teal));opacity:.6;}

.card-evidence{position:absolute;inset:0;background:var(--paper);color:#2A2620;padding:18px 20px;
  opacity:0;transform:translateY(6px) scale(.99);transition:opacity .28s ease, transform .28s ease;
  overflow-y:auto;pointer-events:none;
  background-image:repeating-linear-gradient(transparent, transparent 27px, var(--paper-line) 28px);
  background-position:0 4px;}
.card:hover .card-evidence, .card.flipped .card-evidence{opacity:1;transform:translateY(0) scale(1);pointer-events:auto;}
.card:hover .card-front, .card.flipped .card-front{opacity:0;transform:translateY(-4px);}
.ev-item{margin-bottom:9px;}
.ev-item:last-child{margin-bottom:0;}
.ev-tag{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.1em;color:#8A6D2E;font-weight:600;}
.ev-txt{font-size:12.5px;line-height:1.5;margin-top:2px;}
.ev-txt.code{font-family:var(--mono);font-size:11px;background:rgba(42,38,32,.06);padding:3px 6px;border-radius:4px;display:inline-block;line-height:1.5;}
.ev-txt.prose{font-family:var(--serif);}

/* ---- note ---- */
.note{border-left:2px solid var(--violet);padding:14px 20px;font-size:13px;line-height:1.7;color:var(--ink-dim);
  background:rgba(169,140,255,.045);border-radius:0 8px 8px 0;}
.note b{color:var(--ink);font-weight:600;}
.note::before{content:'GHI CHÚ ĐIỀU TRA';display:block;font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;
  color:var(--violet);margin-bottom:6px;}

/* scrollbar */
.slide::-webkit-scrollbar, .card-evidence::-webkit-scrollbar{width:5px;}
.slide::-webkit-scrollbar-thumb{background:var(--rule);border-radius:4px;}
.card-evidence::-webkit-scrollbar-thumb{background:var(--paper-line);border-radius:4px;}

/* keyboard focus */
.navbtn:focus-visible, .dot:focus-visible, .card:focus-visible{outline:2px solid var(--teal);outline-offset:2px;}

@media (max-width:980px){
  .slide{padding:80px 22px 96px;}
  .cards.g3, .cards.g4{grid-template-columns:1fr 1fr;}
  .cover-meta{flex-wrap:wrap;}
  .cover-meta .m{border-right:none;border-bottom:1px solid var(--rule);flex:1 1 40%;}
  #chrome-top, #chrome-bottom{padding-left:16px;padding-right:16px;}
}
@media (max-width:620px){
  .cards.g3, .cards.g4{grid-template-columns:1fr;}
  h2.title{font-size:22px;}
}
@media (prefers-reduced-motion: reduce){
  .slide, .card, .card-front, .card-evidence{transition:none !important;}
}
</style>
</head>

<script>
const SLIDES = JSON.parse(document.getElementById('slides-data').textContent);
const deck = document.getElementById('deck');
const dotsWrap = document.getElementById('dots');
let cur = 0;

function escAttr(s){ return s; }

function buildCoverH1(h1arr){
  return h1arr.map(pair => {
    const [text, isEm] = pair;
    return isEm ? `<em>${text}</em>` : text;
  }).join(' ');
}

function buildCard(c){
  const accent = c.accent || 'var(--teal)';
  const evHtml = c.e.map(item => {
    const cls = item.prose ? 'prose' : 'code';
    return `<div class="ev-item"><div class="ev-tag">${item.tag}</div><div class="ev-txt ${cls}">${item.txt}</div></div>`;
  }).join('');
  return `
  <div class="card" tabindex="0" style="--accent:${accent}">
    <div class="card-front">
      <div class="v">${c.v}</div>
      <div class="l">${c.l}</div>
      <div class="flip-hint">chạm để xem bằng chứng</div>
    </div>
    <div class="card-evidence">${evHtml}</div>
  </div>`;
}

function buildSlide(s, idx){
  const el = document.createElement('div');
  el.className = 'slide' + (s.layout === 'cover' ? ' cover' : '');
  el.dataset.idx = idx;

  if(s.layout === 'cover'){
    const metaHtml = s.meta.map(m => `<div class="m"><div class="mv">${m[0]}</div><div class="ml">${m[1]}</div></div>`).join('');
    el.innerHTML = `
      <div class="slide-inner">
        <div class="tagline">${s.tag}</div>
        <div class="sup">${s.sup}</div>
        <h1>${buildCoverH1(s.h1)}</h1>
        <p class="sub">${s.sub}</p>
        <div class="cover-meta">${metaHtml}</div>
      </div>`;
  } else {
    const cardsHtml = s.cards.map(buildCard).join('');
    el.innerHTML = `
      <div class="slide-inner">
        <div class="tag-pill">${s.tag}</div>
        <div class="kicker">${s.kicker}</div>
        <h2 class="title">${s.title}</h2>
        <p class="lede">${s.lede}</p>
        <div class="cards ${s.grid || 'g3'}">${cardsHtml}</div>
        <div class="note">${s.note}</div>
      </div>`;
  }
  return el;
}

function init(){
  SLIDES.forEach((s, idx) => {
    deck.appendChild(buildSlide(s, idx));
    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.setAttribute('role','button');
    dot.setAttribute('aria-label', 'Đi tới slide ' + (idx+1));
    dot.tabIndex = 0;
    dot.addEventListener('click', () => goTo(idx));
    dot.addEventListener('keydown', e => { if(e.key==='Enter') goTo(idx); });
    dotsWrap.appendChild(dot);
  });
  document.getElementById('counter-total').textContent = String(SLIDES.length - 1).padStart(2,'0');

  // click-to-flip for touch devices
  deck.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', (e) => {
      if(window.matchMedia('(hover: none)').matches){
        card.classList.toggle('flipped');
      }
    });
    card.addEventListener('keydown', e => {
      if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); card.classList.toggle('flipped'); }
    });
  });

  goTo(0, true);
}

function goTo(idx, instant){
  idx = Math.max(0, Math.min(SLIDES.length - 1, idx));
  cur = idx;
  document.querySelectorAll('.slide').forEach((el,i) => el.classList.toggle('active', i === idx));
  document.querySelectorAll('.dot').forEach((el,i) => el.classList.toggle('active', i === idx));
  document.getElementById('counter-cur').textContent = String(idx).padStart(2,'0');
  document.getElementById('progress-bar').style.width = (idx/(SLIDES.length-1)*100) + '%';
  document.getElementById('btn-prev').classList.toggle('disabled', idx === 0);
  document.getElementById('btn-next').classList.toggle('disabled', idx === SLIDES.length - 1);
  const activeSlide = document.querySelector('.slide.active');
  if(activeSlide) activeSlide.scrollTop = 0;
}

document.getElementById('btn-prev').addEventListener('click', () => goTo(cur - 1));
document.getElementById('btn-next').addEventListener('click', () => goTo(cur + 1));

window.addEventListener('keydown', (e) => {
  if(e.key === 'ArrowRight' || e.key === 'PageDown'){ e.preventDefault(); goTo(cur + 1); }
  else if(e.key === 'ArrowLeft' || e.key === 'PageUp'){ e.preventDefault(); goTo(cur - 1); }
  else if(e.key === 'Home'){ goTo(0); }
  else if(e.key === 'End'){ goTo(SLIDES.length - 1); }
});

let touchStartX = null;
deck.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive:true});
deck.addEventListener('touchend', e => {
  if(touchStartX === null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if(Math.abs(dx) > 60){ dx < 0 ? goTo(cur+1) : goTo(cur-1); }
  touchStartX = null;
}, {passive:true});

init();
</script>
